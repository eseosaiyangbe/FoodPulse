# sentinel/sentinel-01.conf

port 26379
dir /tmp

# Monitor the master by its Docker name
sentinel monitor mymaster redis-server 6379 2

# Authenticate to master/replicas using the same password they require
sentinel auth-pass mymaster admin

# Sensible defaults
sentinel down-after-milliseconds mymaster 5000
sentinel parallel-syncs mymaster 1
sentinel failover-timeout mymaster 60000

# For Docker / dynamic environments:
# Keep hostnames instead of hard-coding IPs when Sentinel rewrites config.
sentinel resolve-hostnames yes
sentinel announce-hostnames yes