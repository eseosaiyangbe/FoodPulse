bind 0.0.0.0
port 6379

dir /data
appendonly yes
appendfsync everysec

# Redis 7.2 uses "replicaof"
replicaof redis-server 6379

# authenticate to master
masterauth admin

# require auth for clients connecting to replicas too
requirepass admin
# Optional: just to see logs in container output
logfile ""
# redis/replica/redis.conf

bind 0.0.0.0
port 6379
protected-mode no

# Follow the master by Docker hostname
replicaof redis-server 6379

# Password to authenticate to MASTER
masterauth admin

# Password this replica itself enforces for clients
requirepass admin

# Persistence options (replicas normally also persist)
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

dir /data
