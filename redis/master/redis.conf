bind 0.0.0.0
port 6379

dir /data
appendonly yes
appendfsync everysec
# Security: require password for all clients
requirepass admin


# Optional: just to see logs in container output
logfile ""
# redis/master/redis.conf

bind 0.0.0.0
port 6379
protected-mode no

# This node is the primary
# NO replicaof here

# Enable AUTH for all clients
requirepass admin

# Basic persistence (optional tuning)
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# For Sentinel + replicas
dir /data
