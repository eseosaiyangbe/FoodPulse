
services:
  # -------------------------
  # YELB frontend + appserver
  # -------------------------
  yelb-ui:
    platform: linux/amd64
    image: mreferre/yelb-ui:0.7
    container_name: yelb-ui
    ports:
      - "80:80"
    depends_on:
      - yelb-appserver
    networks:
      - yelbnet
    restart: always

  yelb-appserver:
    platform: linux/amd64
    image: eseosaiyangbe/yelb-appserver:v2
    container_name: yelb-appserver
    depends_on:
      - pg-haproxy
      - redis-haproxy
    environment:
      - YELB_DB_SERVER=${YELB_DB_SERVER}
      - YELB_REDIS_SERVER=${YELB_REDIS_SERVER}
      - YELB_REDIS_PASSWORD=${YELB_REDIS_PASSWORD}
    networks:
      - yelbnet
    restart: always

  # ------------------------------
  # Redis HA cluster (master + replicas)
  # ------------------------------
  redis-server:
    platform: linux/amd64
    image: redis:7.2
    container_name: redis-server
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis-master-data:/data
      - ./redis/master/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - yelbnet
    restart: always

  odilia-redis01:
    platform: linux/amd64
    image: redis:7.2
    container_name: odilia-redis01
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis-replica-data:/data
      - ./redis/replica/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - yelbnet
    restart: always

  odilia-redis02:
    platform: linux/amd64
    image: redis:7.2
    container_name: odilia-redis02
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis-replica2-data:/data
      - ./redis/replica/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - yelbnet
    restart: always

  # -------------------------
  # Redis Sentinels (3 nodes)
  # -------------------------
  odilia-redis-sentinel01:
    platform: linux/amd64
    image: redis:7.2
    container_name: odilia-redis-sentinel01
    command: ["redis-sentinel", "/usr/local/etc/redis/sentinel.conf"]
    volumes:
      - ./sentinel/sentinel-01.conf:/usr/local/etc/redis/sentinel.conf
    depends_on:
      - redis-server
      - odilia-redis01
      - odilia-redis02
    networks:
      - yelbnet
    ports:
      - "26379:26379"
    restart: always

  odilia-redis-sentinel02:
    platform: linux/amd64
    image: redis:7.2
    container_name: odilia-redis-sentinel02
    command: ["redis-sentinel", "/usr/local/etc/redis/sentinel.conf"]
    volumes:
      - ./sentinel/sentinel-02.conf:/usr/local/etc/redis/sentinel.conf
    depends_on:
      - redis-server
      - odilia-redis01
      - odilia-redis02
    networks:
      - yelbnet
    restart: always

  odilia-redis-sentinel03:
    platform: linux/amd64
    image: redis:7.2
    container_name: odilia-redis-sentinel03
    command: ["redis-sentinel", "/usr/local/etc/redis/sentinel.conf"]
    volumes:
      - ./sentinel/sentinel-03.conf:/usr/local/etc/redis/sentinel.conf
    depends_on:
      - redis-server
      - odilia-redis01
      - odilia-redis02
    networks:
      - yelbnet
    restart: always

  # ------------------------------
  # YELB DB (PRIMARY) - Postgres 14
  # ------------------------------
  yelb-db:
    platform: linux/amd64
    image: postgres:14
    container_name: yelb-db
    environment:
      POSTGRES_USER: ${YELB_DB_USER}
      POSTGRES_PASSWORD: ${YELB_DB_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby=on
      -c listen_addresses='*'
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./yelb-db/init-yelb-db.sh:/docker-entrypoint-initdb.d/01-init-yelb-db.sh:ro
      - ./yelb-db/02-create-replicator.sql:/docker-entrypoint-initdb.d/02-create-replicator.sql:ro
      - ./yelb-db/03-pghba-override.sh:/docker-entrypoint-initdb.d/03-pghba-override.sh:ro
    networks:
      - yelbnet
    restart: always

  # ------------------------------------------
  # Postgres streaming replicas
  # ------------------------------------------
  odilia-db-replication01:
    platform: linux/amd64
    image: postgres:14
    container_name: yelb-db-replica1
    environment:
      POSTGRES_USER: ${YELB_DB_USER}
      POSTGRES_PASSWORD: ${YELB_DB_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust
      PGPASSWORD: ${PG_REPLICATOR_PASSWORD}
    depends_on:
      - yelb-db
    entrypoint: ["/usr/local/bin/replica-entrypoint.sh"]
    volumes:
      - db-data1:/var/lib/postgresql/data
      - ./postgres/replica-entrypoint.sh:/usr/local/bin/replica-entrypoint.sh:ro
    networks:
      - yelbnet
    restart: always

  odilia-db-replication02:
    platform: linux/amd64
    image: postgres:14
    container_name: yelb-db-replica2
    environment:
      POSTGRES_USER: ${YELB_DB_USER}
      POSTGRES_PASSWORD: ${YELB_DB_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust
      PGPASSWORD: ${PG_REPLICATOR_PASSWORD}
    depends_on:
      - yelb-db
    entrypoint: ["/usr/local/bin/replica-entrypoint.sh"]
    volumes:
      - db-data2:/var/lib/postgresql/data
      - ./postgres/replica-entrypoint.sh:/usr/local/bin/replica-entrypoint.sh:ro
    networks:
      - yelbnet
    restart: always

  odilia-db-replication03:
    platform: linux/amd64
    image: postgres:14
    container_name: yelb-db-replica3
    environment:
      POSTGRES_USER: ${YELB_DB_USER}
      POSTGRES_PASSWORD: ${YELB_DB_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust
      PGPASSWORD: ${PG_REPLICATOR_PASSWORD}
    depends_on:
      - yelb-db
    entrypoint: ["/usr/local/bin/replica-entrypoint.sh"]
    volumes:
      - db-data3:/var/lib/postgresql/data
      - ./postgres/replica-entrypoint.sh:/usr/local/bin/replica-entrypoint.sh:ro
    networks:
      - yelbnet
    restart: always

  # ------------------------------
  # HAProxy for Postgres routing
  # ------------------------------
  pg-haproxy:
    platform: linux/amd64
    image: haproxy:2.9
    container_name: pg-haproxy
    depends_on:
      - yelb-db
      - odilia-db-replication01
      - odilia-db-replication02
      - odilia-db-replication03
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "5432:5432"   # RW pool
      - "5433:5433"   # RO pool
      - "8404:8404"   # HAProxy stats UI
    networks:
      - yelbnet
    restart: always

  # ------------------------------
  # HAProxy for Redis routing
  # ------------------------------
  redis-haproxy:
    platform: linux/amd64
    image: haproxy:2.9
    container_name: redis-haproxy
    depends_on:
      - redis-server
      - odilia-redis01
      - odilia-redis02
    volumes:
      - ./haproxy/haproxy-redis.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "6379:6379"   # Redis entrypoint for app
      # 8404/8405 are internal-only (Prometheus + stats)
    networks:
      - yelbnet
    restart: always

  # -------------------------
  # Metrics exporters
  # -------------------------
  postgres-exporter:
    platform: linux/amd64
    image: quay.io/prometheuscommunity/postgres-exporter
    container_name: postgres-exporter
    environment:
      - DATA_SOURCE_NAME=${POSTGRES_EXPORTER_DSN}
    networks:
      - yelbnet
    restart: always

  redis-exporter:
    platform: linux/amd64
    image: oliver006/redis_exporter:v1.61.0
    container_name: redis-exporter
    environment:
      - REDIS_ADDR=redis-haproxy:6379
      - REDIS_PASSWORD=${YELB_REDIS_PASSWORD}
    networks:
      - yelbnet
    restart: always

  # -------------------------
  # Prometheus
  # -------------------------
  prometheus:
    platform: linux/amd64
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - yelbnet
    restart: always

  # -------------------------
  # Grafana
  # -------------------------
  grafana:
    platform: linux/amd64
    image: grafana/grafana:11.0.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    networks:
      - yelbnet
    restart: always

  # -------------------------
  # Blackbox exporter
  # -------------------------
  blackbox-exporter:
    platform: linux/amd64
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox-exporter
    command:
      - "--config.file=/etc/blackbox/blackbox.yml"
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    networks:
      - yelbnet
    restart: always

  alertmanager:
    platform: linux/amd64
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"   # Alertmanager UI / API
    networks:
      - yelbnet
    restart: always


# -------------------------
# Network
# -------------------------
networks:
  yelbnet:
    driver: bridge

# -------------------------
# Volumes
# -------------------------
volumes:
  db-data:
  db-data1:
  db-data2:
  db-data3:
  redis-master-data:
  redis-replica-data:
  redis-replica2-data:
  grafana-data:
