global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  # --------------------------------
  # Prometheus itself
  # --------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'prometheus:9090'

  # --------------------------------
  # Postgres exporter
  # --------------------------------
  - job_name: 'postgres'
    static_configs:
      - targets:
          - 'postgres-exporter:9187'

  # --------------------------------
  # Redis exporter
  # --------------------------------
  - job_name: 'redis'
    static_configs:
      - targets:
          - 'redis-exporter:9121'

  # --------------------------------
  # HAProxy metrics (PG + Redis)
  # --------------------------------
  - job_name: 'haproxy'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'pg-haproxy:8405'
          - 'redis-haproxy:8405'
        labels:
          stack: 'yelb-odilia'
          component: 'haproxy'

  # --------------------------------
  # Blackbox HTTP probes
  # --------------------------------
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - 'http://yelb-ui/'
          - 'http://yelb-appserver:4567/api/getstats'
    relabel_configs:
      # Pass the original URL as the 'target' parameter
      - source_labels: [__address__]
        target_label: __param_target
      # Use the target URL as the instance label
      - source_labels: [__param_target]
        target_label: instance
      # Replace the scrape address with the blackbox exporter
      - target_label: __address__
        replacement: blackbox-exporter:9115
