global:
  resolve_timeout: 5m
  slack_api_url: 'https://hooks.slack.com/services/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'

route:
  receiver: 'slack-default'
  group_by: ['alertname', 'severity', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

  routes:
    - matchers:
        - severity="critical"
      receiver: 'slack-critical'
      continue: false

    - matchers:
        - severity="warning"
      receiver: 'slack-warning'
      continue: false

receivers:

  # ---------------------------------------------------
  # DEFAULT
  # ---------------------------------------------------
  - name: 'slack-default'
    slack_configs:
      - channel: '#critical-alert'
        send_resolved: true
        title: '[YELB][{{ .Status | toUpper }}] {{ .CommonLabels.alertname }} ({{ or .CommonLabels.severity "info" }})'
        text: |-
          *Status:* {{ .Status | toUpper }}
          *Alert:* {{ .CommonLabels.alertname }}
          *Severity:* {{ or .CommonLabels.severity "info" }}
          *Service:* {{ or .CommonLabels.service "unknown" }}
          *Component:* {{ or .CommonLabels.component "unknown" }}

          {{ range .Alerts -}}
          *Instance:* `{{ .Labels.instance }}`
          *Summary:* {{ or .Annotations.summary "N/A" }}
          *Description:* {{ or .Annotations.description "N/A" }}
          *Runbook:* {{ or .Annotations.runbook_url "N/A" }}
          *StartsAt:* {{ .StartsAt }}
          {{ end }}

  # ---------------------------------------------------
  # WARNING
  # ---------------------------------------------------
  - name: 'slack-warning'
    slack_configs:
      - channel: '#critical-alert'
        send_resolved: true
        title: '[YELB][WARNING] {{ .CommonLabels.alertname }}'
        text: |-
          *Status:* {{ .Status | toUpper }}
          *Alert:* {{ .CommonLabels.alertname }}
          *Severity:* {{ or .CommonLabels.severity "warning" }}
          *Service:* {{ or .CommonLabels.service "unknown" }}
          *Component:* {{ or .CommonLabels.component "unknown" }}

          {{ range .Alerts -}}
          *Instance:* `{{ .Labels.instance }}`
          *Summary:* {{ or .Annotations.summary "N/A" }}
          *Description:* {{ or .Annotations.description "N/A" }}
          *Runbook:* {{ or .Annotations.runbook_url "N/A" }}
          *StartsAt:* {{ .StartsAt }}
          {{ end }}

  # ---------------------------------------------------
  # CRITICAL
  # ---------------------------------------------------
  - name: 'slack-critical'
    slack_configs:
      - channel: '#critical-alert'
        send_resolved: true
        title: '[YELB][CRITICAL] {{ .CommonLabels.alertname }}'
        text: |-
          *Status:* {{ .Status | toUpper }}
          *Alert:* {{ .CommonLabels.alertname }}
          *Severity:* {{ or .CommonLabels.severity "critical" }}
          *Service:* {{ or .CommonLabels.service "unknown" }}
          *Component:* {{ or .CommonLabels.component "unknown" }}

          {{ range .Alerts -}}
          *Instance:* `{{ .Labels.instance }}`
          *Summary:* {{ or .Annotations.summary "N/A" }}
          *Description:* {{ or .Annotations.description "N/A" }}
          *Runbook:* {{ or .Annotations.runbook_url "N/A" }}
          *StartsAt:* {{ .StartsAt }}
          {{ end }}

# ---------------------------------------------------
# INHIBITION RULES
# ---------------------------------------------------
inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname', 'service', 'component']
