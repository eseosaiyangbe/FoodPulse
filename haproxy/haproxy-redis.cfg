global
    log stdout format raw local0
    maxconn 4096
    # Foreground mode for containers
    stats socket /tmp/redis-haproxy.sock mode 660 level admin
    stats timeout 30s

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s

# ------------------------------------------------
# Redis client entrypoint (Yelb connects here)
# ------------------------------------------------
frontend redis_front
    bind *:6379
    mode tcp
    default_backend redis_master

# ------------------------------------------------
# Human-readable HAProxy stats UI (HTTP)
# Only visible inside the Docker network
# ------------------------------------------------
frontend admin
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends

# ------------------------------------------------
# Prometheus metrics for this HAProxy instance
# ------------------------------------------------
frontend redis_metrics
    bind *:8405
    mode http
    http-request use-service prometheus-exporter

# ------------------------------------------------
# Backend: Redis master selection via tcp-check
# Only the node answering "role:master" is UP
# ------------------------------------------------
backend redis_master
    mode tcp
    option tcp-check
    default-server inter 2s downinter 2s rise 1 fall 2

    # 1) AUTH with the Redis password
    tcp-check send "AUTH admin\r\n"
    tcp-check expect string "+OK"

    # 2) Check PING/PONG
    tcp-check send "PING\r\n"
    tcp-check expect string "+PONG"

    # 3) Check that this node is the master
    tcp-check send "INFO replication\r\n"
    tcp-check expect string "role:master"

    # Redis nodes managed by Sentinel
    server redis_server   redis-server:6379   check
    server redis_replica1 odilia-redis01:6379 check
    server redis_replica2 odilia-redis02:6379 check
