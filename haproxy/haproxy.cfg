global
  log stdout format raw local0

defaults
  log     global
  mode    tcp
  option  tcplog
  timeout connect 5s
  timeout client  60s
  timeout server  60s

# ------------------------------------------------
# Human-friendly stats UI (HTTP)
# ------------------------------------------------
frontend pg_stats
  mode http
  bind *:8404
  stats enable
  stats uri /stats
  stats refresh 10s
  stats show-legends

# ------------------------------------------------
# Prometheus metrics frontend
# ------------------------------------------------
frontend pg_metrics
  mode http
  bind *:8405
  http-request use-service prometheus-exporter

# ------------------------------------------------
# RW frontend: writes only – goes to primary pool
# ------------------------------------------------
frontend pg_rw
  bind *:5432
  default_backend pg_rw_backend

# ------------------------------------------------
# RO frontend: reads only – goes to replica pool
# ------------------------------------------------
frontend pg_ro
  bind *:5433
  default_backend pg_ro_backend

# ------------------------------------------------
# RW backend: primary only
# ------------------------------------------------
backend pg_rw_backend
  mode tcp
  balance first
  option pgsql-check user postgres
  default-server inter 2s downinter 2s rise 2 fall 3

  # Primary only – RW
  server primary yelb-db:5432 check

# ------------------------------------------------
# RO backend: replicas only (safe reads)
# ------------------------------------------------
backend pg_ro_backend
  mode tcp
  balance roundrobin
  option pgsql-check user postgres
  default-server inter 2s downinter 2s rise 2 fall 3

  # Read-only replica pool
  server replica1 yelb-db-replica1:5432 check
  server replica2 yelb-db-replica2:5432 check
  server replica3 yelb-db-replica3:5432 check
